name: Secret Safety & Key Management
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Setup tools for Firebase key management
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          service_account_key: ${{ secrets.GCLOUD_SA_KEY }}
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}
      
      - name: Setup gh CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh
          gh auth login --with-token <<< ${{ secrets.GITHUB_TOKEN }}
      
      - name: Check for hardcoded secrets
        run: |
          # Scan for common secret patterns
          if grep -r "sk_live_\|pk_live_\|api_key\|secret_key\|FIREBASE_API_KEY" --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "❌ Found potential hardcoded secrets!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi
      
      - name: Validate .env.example exists
        run: |
          if [ ! -f .env.example ]; then
            echo "❌ .env.example missing - create it with required environment variables"
            exit 1
          else
            echo "✅ .env.example found"
          fi
      
      - name: Check .env.example coverage
        run: |
          # Basic check - ensure common vars are documented
          REQUIRED_VARS=("VITE_FIREBASE_API_KEY" "VITE_FIREBASE_AUTH_DOMAIN" "STRIPE_PUBLISHABLE_KEY")
          for var in "${REQUIRED_VARS[@]}"; do
            if ! grep -q "$var" .env.example; then
              echo "❌ $var not documented in .env.example"
              exit 1
            fi
          done
          echo "✅ Required vars documented in .env.example"
      
      - name: Check for stale Firebase keys (weekly)
        if: github.event_name == 'schedule'
        run: |
          # List service account keys and check ages
          echo "🔄 Checking Firebase service account keys..."
          
          gcloud iam service-accounts keys list --iam-account=${{ secrets.FIREBASE_SA_EMAIL }} --format="value(name.basename(),createTime)" | while read key_id create_time; do
            # Calculate age in days
            create_epoch=$(date -d "$create_time" +%s)
            now_epoch=$(date +%s)
            age_days=$(( (now_epoch - create_epoch) / 86400 ))
            
            if [ $age_days -gt 90 ]; then
              echo "⚠️  Key $key_id is $age_days days old - time to rotate!"
              # Create GitHub issue
              gh issue create \
                --title "Rotate Stale Firebase Key: $key_id" \
                --body "Service account key $key_id is $age_days days old (created $create_time). Please rotate this key for security." \
                --label "security,key-rotation"
            fi
          done
          
          echo "✅ Firebase key check complete"
      
      - name: Lock-in check for production deploys
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          # Ensure no .env changes in main branch
          if git diff HEAD~1 --name-only | grep -q "\.env"; then
            echo "❌ .env files should not be committed to main - use secret managers"
            exit 1
          else
            echo "✅ No .env changes in main branch"
          fi