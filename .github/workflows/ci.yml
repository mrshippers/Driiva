name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build (client + server)
    runs-on: ubuntu-latest
    # Fake Firebase env vars so Vite can build without real credentials
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_PROJECT_ID: driiva
      VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-placeholder
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build
        run: npm run build

  functions-build:
    name: Build (Cloud Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npm run build
        working-directory: functions

      - name: Test functions
        run: npm test
        working-directory: functions

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run test:coverage

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, functions-build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      # ── Staging Firebase config (from GitHub Secrets) ────────────────────
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_FEATURE_AI_INSIGHTS: "true"
      VITE_FEATURE_COMMUNITY_POOL: "true"
      VITE_FEATURE_LEADERBOARD: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      # Build client with staging Firebase config (VITE_* vars injected above)
      - name: Build client (staging)
        run: npm run build:staging

      # ── Firebase ──────────────────────────────────────────────────────────
      # Deploys Firestore rules, indexes, and Cloud Functions to driiva-staging.
      # Requires: FIREBASE_TOKEN secret set in GitHub → Settings → Secrets.
      # Cloud Functions require the driiva-staging project to be on the Blaze plan.
      # If not yet upgraded, change --only to: firestore:rules,firestore:indexes
      # TODO: Create staging Firebase project and add FIREBASE_TOKEN to GitHub Secrets
      - name: Deploy Firebase to staging
        continue-on-error: true
        run: |
          npx firebase deploy \
            --only firestore:rules,firestore:indexes,functions \
            --project staging \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Vercel ────────────────────────────────────────────────────────────
      # Deploys the pre-built client + Express serverless function to Vercel.
      # Requires these GitHub Secrets:
      #   VERCEL_TOKEN            — from vercel.com/account/tokens
      #   VERCEL_ORG_ID           — from .vercel/project.json or Vercel dashboard
      #   VERCEL_PROJECT_ID_STAGING — Vercel project ID for the staging project
      # Runtime env vars (DATABASE_URL, ANTHROPIC_API_KEY etc.) must be set in
      # the Vercel staging project's Environment Variables settings.
      # TODO: Create staging Firebase project and add FIREBASE_TOKEN to GitHub Secrets
      - name: Deploy to Vercel (staging)
        continue-on-error: true
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

  # ═══════════════════════════════════════════════════════════════════════════
  # PRODUCTION DEPLOY
  # ═══════════════════════════════════════════════════════════════════════════
  # Runs when:
  #   1. You manually trigger "Run workflow" → pick "production" from dropdown
  #   2. You push a git tag like v1.0.0
  #
  # Requires the "production" GitHub Environment to be set up:
  #   GitHub → Settings → Environments → New → "production"
  #   → Add yourself as Required Reviewer
  #   → This gives you a "Review deployments" approval button before it goes live
  #
  # Required GitHub Secrets (set in the "production" environment):
  #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_PRODUCTION
  #   FIREBASE_TOKEN (for deploying rules + functions to production Firebase)
  #   All VITE_FIREBASE_* vars for the production Firebase project
  #   VITE_SENTRY_DSN (production Sentry DSN)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, functions-build, test]
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'production')
      || startsWith(github.ref, 'refs/tags/v')
    environment: production
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
      VITE_FEATURE_AI_INSIGHTS: "true"
      VITE_FEATURE_COMMUNITY_POOL: "true"
      VITE_FEATURE_LEADERBOARD: "true"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      - name: Build client (production)
        run: npm run build

      # Deploy Firestore rules, indexes, and Cloud Functions to production
      - name: Deploy Firebase to production
        run: |
          npx firebase deploy \
            --only firestore:rules,firestore:indexes,functions \
            --project default \
            --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # Deploy client + Express server to production Vercel project
      - name: Deploy to Vercel (production)
        run: npx vercel --prod --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRODUCTION }}
